<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="rs-glow-green">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rs-glow-red">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="rs-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#00e676" opacity="0.9"/>
    </marker>
  </defs>

  <rect width="600" height="400" fill="#0b0c1a"/>

  <!-- Map grid -->
  <g stroke="#141e2e" stroke-width="0.8">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="60" y1="0" x2="60" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="420" y1="0" x2="420" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
  </g>

  <!-- Inactive links (dashed gray) -->
  <g stroke="#1e2d42" stroke-width="1.5" stroke-dasharray="5 4" fill="none">
    <line x1="68" y1="207" x2="155" y2="287"/>
    <line x1="155" y1="287" x2="285" y2="207"/>
    <line x1="155" y1="287" x2="405" y2="275"/>
    <line x1="285" y1="207" x2="285" y2="92"/>
    <line x1="285" y1="92" x2="405" y2="138"/>
    <line x1="285" y1="207" x2="405" y2="275"/>
    <line x1="405" y1="275" x2="515" y2="207"/>
  </g>

  <!-- Active route glow (wide, soft) -->
  <g stroke="#00e676" stroke-width="7" opacity="0.12" fill="none">
    <line x1="68" y1="207" x2="158" y2="122"/>
    <line x1="158" y1="122" x2="285" y2="207"/>
    <line x1="285" y1="207" x2="405" y2="138"/>
    <line x1="405" y1="138" x2="515" y2="207"/>
  </g>

  <!-- Active route (green solid with arrows) -->
  <g stroke="#00e676" stroke-width="2" fill="none" marker-end="url(#rs-arrow)">
    <line x1="68" y1="207" x2="150" y2="126"/>
    <line x1="162" y1="120" x2="277" y2="200"/>
    <line x1="292" y1="206" x2="398" y2="141"/>
    <line x1="408" y1="136" x2="510" y2="202"/>
  </g>

  <!-- Packet indicators -->
  <circle cx="112" cy="163" r="4.5" fill="#00e676" opacity="0.85"/>
  <circle cx="222" cy="164" r="4.5" fill="#00e676" opacity="0.85"/>
  <circle cx="348" cy="172" r="4.5" fill="#00e676" opacity="0.85"/>
  <circle cx="458" cy="172" r="4.5" fill="#00e676" opacity="0.85"/>

  <!-- Inactive nodes -->
  <circle cx="155" cy="287" r="10" fill="#101620" stroke="#1e2d42" stroke-width="1.5"/>
  <text x="155" y="306" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3a4858">Router C</text>

  <circle cx="285" cy="92" r="10" fill="#101620" stroke="#1e2d42" stroke-width="1.5"/>
  <text x="285" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3a4858">Node E</text>

  <!-- Fault node -->
  <circle cx="405" cy="275" r="13" fill="#1a0508" stroke="#ff4444" stroke-width="2" filter="url(#rs-glow-red)"/>
  <text x="405" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#ff4444" font-weight="bold">!</text>
  <text x="405" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#ff5555">FAULT DETECTED</text>

  <!-- Route nodes -->
  <circle cx="68" cy="207" r="15" fill="#041208" stroke="#00e676" stroke-width="2" filter="url(#rs-glow-green)"/>
  <text x="68" y="211" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#00e676" font-weight="bold">SRC</text>
  <text x="68" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#00a854">10.0.1.1</text>

  <circle cx="158" cy="122" r="11" fill="#071410" stroke="#00e676" stroke-width="1.5"/>
  <text x="158" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#50c878">Router B</text>

  <circle cx="285" cy="207" r="16" fill="#041208" stroke="#00e676" stroke-width="2.5" filter="url(#rs-glow-green)"/>
  <text x="285" y="211" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#00e676" font-weight="bold">CORE</text>

  <circle cx="405" cy="138" r="11" fill="#071410" stroke="#00e676" stroke-width="1.5"/>
  <text x="405" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#50c878">Router F</text>

  <circle cx="515" cy="207" r="15" fill="#041208" stroke="#00e676" stroke-width="2" filter="url(#rs-glow-green)"/>
  <text x="515" y="211" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#00e676" font-weight="bold">DST</text>
  <text x="515" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#00a854">10.0.9.9</text>

  <!-- Route badge -->
  <rect x="190" y="17" width="220" height="26" rx="3" fill="#041208" stroke="#00e676" stroke-width="1"/>
  <text x="300" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#00e676" font-weight="bold">OPTIMAL ROUTE: 4 HOPS</text>

  <!-- Legend -->
  <line x1="20" y1="382" x2="40" y2="382" stroke="#00e676" stroke-width="2"/>
  <text x="46" y="385" font-family="system-ui,sans-serif" font-size="9" fill="#3a4858">Active Route</text>
  <line x1="130" y1="382" x2="150" y2="382" stroke="#1e2d42" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="156" y="385" font-family="system-ui,sans-serif" font-size="9" fill="#3a4858">Inactive Path</text>
  <circle cx="247" cy="381" r="5" fill="#1a0508" stroke="#ff4444" stroke-width="1.5"/>
  <text x="258" y="385" font-family="system-ui,sans-serif" font-size="9" fill="#3a4858">Fault Node</text>

  <!-- Title -->
  <text x="20" y="32" font-family="system-ui,sans-serif" font-size="15" fill="#e0e0e0" font-weight="bold">Route Scout</text>
  <text x="20" y="47" font-family="system-ui,sans-serif" font-size="9" fill="#3a5040">The Google Maps of Networking</text>
</svg>
